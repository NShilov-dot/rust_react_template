# Internal static server for the SPA. Listens on :80 inside the docker
# network only — the edge `nginx/` service fronts it on :5173 and adds
# security headers + /api proxying.

server {
    listen 80;
    server_name _;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        application/javascript
        application/json
        image/svg+xml
        text/css
        text/plain;

    # Vite produces hashed filenames in /assets/* — safe to cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Cheap container healthcheck.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # SPA fallback — React Router owns all non-asset paths.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
