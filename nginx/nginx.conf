upstream frontend_upstream {
    server frontend:80;
    keepalive 16;
}

upstream backend_upstream {
    server backend:8080;
    keepalive 16;
}

server {
    listen 80;
    server_name _;
    server_tokens off;

    # ─── Security headers (applied to every response) ──────────────────
    # CSP: only same-origin scripts (Vite emits hashed /assets/*.js → 'self'
    # covers them). 'unsafe-inline' on style-src is required because Tailwind
    # injects inline `style` attributes; tighten with nonces if you can.
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src 'self'; \
         style-src 'self' 'unsafe-inline'; \
         img-src 'self' data:; \
         font-src 'self' data:; \
         connect-src 'self'; \
         object-src 'none'; \
         base-uri 'self'; \
         frame-ancestors 'none'; \
         form-action 'self'"
        always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), interest-cohort=()" always;
    # HSTS is commented out — turn it on when serving over real HTTPS (not localhost).
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Cheap container healthcheck for THIS proxy (not upstream).
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Proxy /api/* → backend:8080/* (trailing slash on proxy_pass strips
    # the /api prefix, matching the dev Vite proxy behavior).
    location /api/ {
        proxy_pass http://backend_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Connection         "";
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        # Long-running responses (e.g. streaming) shouldn't be killed by
        # the default 60s read timeout.
        proxy_read_timeout 300s;
    }

    # Everything else → internal `frontend` service (Vite SPA static).
    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection         "";
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
    }
}
