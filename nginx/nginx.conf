upstream frontend_upstream {
    # Frontend runs `nginx-unprivileged`, which listens on :8080 (the image
    # runs as uid 101 and can't bind privileged ports).
    server frontend:8080;
    keepalive 16;
}

upstream backend_upstream {
    server backend:8080;
    keepalive 16;
}

server {
    listen 80;
    server_name _;
    server_tokens off;

    # ─── Request size & slow-client hardening ──────────────────────────
    # Body cap: the largest legitimate API payload here is a task create /
    # update with title + description + JSON framing — comfortably under
    # 64 KiB. nginx rejects oversized requests with 413 before they even
    # reach the backend. Axum enforces the same limit independently via
    # DefaultBodyLimit (defence-in-depth).
    client_max_body_size 64k;

    # Slowloris / slow-read protection. Default for all three is 60 s,
    # which is far too generous for an API with small, fast payloads.
    # A misbehaving or malicious client that drip-feeds headers or body
    # bytes would otherwise hold a worker connection for a full minute.
    client_header_timeout 10s;
    client_body_timeout   10s;
    send_timeout          10s;

    # How long to wait when opening a connection to an upstream service
    # and when transmitting a request to it. 5 s connect is ample for
    # same-host Docker networking; 60 s send allows for large uploads
    # that pass the body cap (nginx starts forwarding before the cap
    # kicks in on chunked bodies — keep this shorter than proxy_read).
    proxy_connect_timeout  5s;
    proxy_send_timeout    60s;

    # ─── Security headers (applied to every response) ──────────────────
    # CSP: only same-origin scripts (Vite emits hashed /assets/*.js → 'self'
    # covers them). 'unsafe-inline' on style-src is required because Tailwind
    # injects inline `style` attributes; tighten with nonces if you can.
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src 'self'; \
         style-src 'self' 'unsafe-inline'; \
         img-src 'self' data:; \
         font-src 'self' data:; \
         connect-src 'self'; \
         object-src 'none'; \
         base-uri 'self'; \
         frame-ancestors 'none'; \
         form-action 'self'"
        always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), interest-cohort=()" always;
    # Prevents window.opener from being accessible cross-origin (relevant after
    # the OAuth callback redirect chain where the browser navigates cross-site).
    add_header Cross-Origin-Opener-Policy  "same-origin" always;
    # Prevents other origins from loading our assets (images, scripts, fonts)
    # via <img src="...">, <script src="...">, etc. without explicit CORS.
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    # HSTS is commented out — turn it on when serving over real HTTPS (not localhost).
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Cheap container healthcheck for THIS proxy (not upstream).
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Prometheus scrape — internal-only by default. The backend exposes
    # request rates, latencies, and the full endpoint inventory at
    # /api/metrics; leaking that to the public internet is a free
    # reconnaissance feed (traffic patterns, error rates, fingerprinting).
    # `deny all` blocks every source; uncomment the `allow` lines for your
    # monitoring infra (k8s cluster CIDR, VPN, Grafana host, etc).
    location = /api/metrics {
        # allow 10.0.0.0/8;
        # allow 172.16.0.0/12;
        # allow 192.168.0.0/16;
        deny all;
    }

    # Proxy /api/* → backend:8080/* (trailing slash on proxy_pass strips
    # the /api prefix, matching the dev Vite proxy behavior).
    location /api/ {
        proxy_pass http://backend_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Connection         "";
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        # Do NOT use `$proxy_add_x_forwarded_for` — it appends to the client-
        # supplied value, letting any caller spoof their apparent IP and
        # bypass the backend's per-IP rate limiter. Always replace.
        proxy_set_header X-Forwarded-For    $remote_addr;
        # Wipe client-supplied RFC 7239 `Forwarded` for the same reason.
        proxy_set_header Forwarded          "";
        proxy_set_header X-Forwarded-Proto  $scheme;

        # Long-running responses (e.g. streaming) shouldn't be killed by
        # the default 60s read timeout.
        proxy_read_timeout 300s;
    }

    # Everything else → internal `frontend` service (Vite SPA static).
    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection         "";
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        # See the /api/ block — replace, never append; wipe Forwarded.
        proxy_set_header X-Forwarded-For    $remote_addr;
        proxy_set_header Forwarded          "";
        proxy_set_header X-Forwarded-Proto  $scheme;
    }
}
