global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    cluster: rust-react-dev

scrape_configs:
  # Backend app metrics (axum-prometheus RED + business counters).
  - job_name: backend
    metrics_path: /metrics
    static_configs:
      - targets: ['backend:8080']
        labels:
          service: api

  # Collector self-metrics — useful to confirm trace ingest is healthy
  # (otelcol_receiver_accepted_spans_ratio, etc.).
  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8888']
        labels:
          service: otel-collector

  # Prometheus scrapes itself so it shows up as a target.
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
